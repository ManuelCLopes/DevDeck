name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac-release:
    runs-on: macos-latest
    env:
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      DEVDECK_GITHUB_CLIENT_ID: ${{ secrets.DEVDECK_GITHUB_CLIENT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Run Electron smoke tests
        run: npm run test:e2e

      - name: Validate release credentials
        run: npm run release:check:prod

      - name: Build macOS artifacts
        run: npm run dist:mac

      - name: Validate signed release artifacts
        run: npm run release:check:final

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devdeck-macos
          path: |
            release/*.dmg
            release/*.zip

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
