name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Run release preflight
        run: npm run release:check

  desktop-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run build

      - name: Run Electron smoke tests
        run: npm run test:e2e

      - name: Package macOS app directory
        run: npm run pack:mac

      - name: Validate packaged app artifacts
        run: npm run release:check:artifacts
